apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APPLICATION_NAME}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${APPLICATION_NAME}
  template:
    metadata:
      labels:
        app: ${APPLICATION_NAME}
    spec:
      containers:
        - name: ${APPLICATION_NAME}
          image: ${CONTAINER_IMAGE_TAGGED}
          env:
            - name: VITE_API_BASE_URL
              value: https://api-key-manager-api.jtektrnd.net
            - name: VITE_OIDC_AUTHORITY
              value: https://keycloak.jtektrnd.net/realms/jtekt
            - name: VITE_OIDC_CLIENT_ID
              value: public
            - name: VITE_APPS_URL
              value: https://apps.jtektrnd.net
          resources: {}
      imagePullSecrets:
        - name: ecr-credentials

---
apiVersion: v1
kind: Service
metadata:
  name: ${APPLICATION_NAME}
spec:
  type: ClusterIP
  selector:
    app: ${APPLICATION_NAME}
  ports:
    - port: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ${APPLICATION_NAME}
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: API Key Manager
    gethomepage.dev/icon: mdi-key
    gethomepage.dev/group: 業務アプリ
    gethomepage.dev/pod-selector: app=${APPLICATION_NAME}
spec:
  rules:
    - host: api-key-manager.jtektrnd.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ${APPLICATION_NAME}
                port:
                  number: 80
